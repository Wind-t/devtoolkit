name: CI

on:
  push:
    branches: [main, v2]
  pull_request:
    branches: [main, v2]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash syntax check
        run: |
          find . -name '*.sh' -not -path './.git/*' -print0 | xargs -0 -n1 bash -n
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: '.'
          ignore_names: '.bashrc .profile .zshrc .zshenv'
          ignore_paths: 'config'
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: syntax check verify.sh
        run: bash -n verify.sh
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run bootstrap dry-run in Docker
        run: |
          docker run --rm -v ${{ github.workspace }}:/toolkit ubuntu:24.04 bash -c '
            apt-get update -qq && apt-get install -y -qq sudo curl git jq unzip > /dev/null 2>&1
            cd /toolkit && SKIP_WSL_CHECK=1 SKIP_ROOT_CHECK=1 DRY_RUN=1 bash bootstrap.sh
          '
